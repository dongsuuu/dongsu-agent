services:
  - type: web
    name: dongsu-api
    runtime: python
    plan: free
    buildCommand: cd dashboard && pip install -r requirements.txt
    startCommand: cd dashboard && uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    healthCheckPath: /
    autoDeploy: true
